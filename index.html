<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Velvet Brew Café Menu - Premium Food in Kutaisi">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Velvet Brew Café</title>

  <!-- PERFORMANCE: Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- LUXURY FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO -->
  <div class="hero">
    <div class="overlay">
      <h1>Velvet Brew Café</h1>
      <p>Premium Food • Elegant Atmosphere</p>
    </div>
  </div>

  <!-- INFO CARD -->
  <div class="info-card">
    <p>📍 Kutaisi, Georgia</p>
    <p>📞 +995 555 000 111</p>
    <p>📶 WiFi: Velvet123</p>
    <p>Breakfast: 8:00 - 10:00</p>
  </div>

  <!-- SEARCH -->
  <div class="search-container">
    <input type="text" id="search" placeholder="Search menu...">
  </div>

  <!-- MENU -->
  <div class="menu">

    <div class="section">
      <h2>Breakfast</h2>
      <div class="items">
        <div class="item"><span>Omelette</span><span>12 GEL</span></div>
        <div class="item"><span>Pancakes</span><span>10 GEL</span></div>
      </div>
    </div>

    <div class="section">
      <h2>Pizza</h2>
      <div class="items">
        <div class="item"><span>Margherita</span><span>15 GEL</span></div>
        <div class="item"><span>Pepperoni</span><span>18 GEL</span></div>
      </div>
    </div>

    <div class="section">
      <h2>Soups</h2>
      <div class="items">
        <div class="item"><span>Chicken Soup</span><span>9 GEL</span></div>
      </div>
    </div>

    <div class="section drinks">
      <h2>Drinks</h2>
      <div class="items">
        <div class="item"><span>Coffee</span><span>6 GEL</span></div>
        <div class="item"><span>Fresh Juice</span><span>8 GEL</span></div>
      </div>
    </div>

  </div>

  <script src="script.js" defer></script>
</body>
</html>
